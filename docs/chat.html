<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 助手</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; padding: 16px; background: #fff; }
#messages { height: 480px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; margin-bottom: 12px; background: #fafafa; display: flex; flex-direction: column; gap: 10px; }
.msg-user { background: #ff2442; color: #fff; border-radius: 10px; padding: 10px 14px; max-width: 80%; align-self: flex-end; word-break: break-word; }
.msg-bot { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 14px; max-width: 80%; align-self: flex-start; word-break: break-word; }
#input-row { display: flex; gap: 8px; }
#input { flex: 1; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
#send { padding: 10px 20px; background: #ff2442; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
#send:disabled { opacity: 0.6; cursor: not-allowed; }
</style>
</head>
<body>
<div id="messages">
<div class="msg-bot">👋 你好！我是小红书二奢商家服务 AI 助手，可以帮你解答入驻流程、运营玩法、常见问题等。有什么想问的？</div>
</div>
<div id="input-row">
<input id="input" type="text" placeholder="输入问题，按回车发送..." />
<button id="send">发送</button>
</div>

<script>
var PROXY_URL = 'https://xhs-merchant-hub.vercel.app/api/chat';
var messages = document.getElementById('messages');
var input = document.getElementById('input');
var send = document.getElementById('send');
var history = [
{ role: 'system', content: '你是小红书二奢商家服务助手，专门解答二手奢侈品商家在小红书平台的入驻流程、运营技巧、常见问题。回答简洁、专业、友好，使用中文。' }
];

function addMsg(cls, text) {
var div = document.createElement('div');
div.className = cls;
div.textContent = text;
messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;
return div;
}

function doSend() {
var text = input.value.trim();
if (!text) return;
input.value = '';
send.disabled = true;
addMsg('msg-user', text);
history.push({ role: 'user', content: text });
var loading = addMsg('msg-bot', '思考中...');
fetch(PROXY_URL, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ messages: history })
})
.then(function(r) { return r.json(); })
.then(function(d) {
var reply = d.choices && d.choices[0] && d.choices[0].message && d.choices[0].message.content || '抱歉，出了点问题，请稍后再试。';
loading.textContent = reply;
history.push({ role: 'assistant', content: reply });
})
.catch(function() { loading.textContent = '网络错误，请稍后重试。'; })
.finally(function() { send.disabled = false; input.focus(); });
}

send.addEventListener('click', doSend);
input.addEventListener('keydown', function(e) { if (e.key === 'Enter') doSend(); });
</script>
</body>
</html>
